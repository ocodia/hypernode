<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hypernode</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <main class="workspace" id="workspace" aria-label="Graph workspace">
      <div class="toolbar" aria-label="Graph controls">
        <h1 class="toolbar__title">Hypernode</h1>
        <div class="actions toolbar__actions">
          <button id="add-node-btn" type="button">Add Node</button>
          <button id="reset-view-btn" type="button">Reset View</button>
          <button id="undo-btn" type="button">Undo</button>
          <button id="redo-btn" type="button">Redo</button>
          <button id="export-btn" type="button">Export JSON</button>
          <label class="file-input-label" for="import-input">Import JSON</label>
          <input id="import-input" type="file" accept="application/json" />
        </div>
      </div>

      <section class="inspector panel panel--inspector" aria-label="Inspector">
        <h2>Inspector</h2>
        <div id="inspector-content"></div>
      </section>

      <div class="canvas" id="canvas">
        <svg class="edges" id="edges-layer" aria-hidden="true">
          <g id="edges-group"></g>
          <g id="edge-draft-group"></g>
        </svg>
        <div class="nodes" id="nodes-layer"></div>
        <svg class="edges edges--overlay" id="edges-overlay-layer" aria-hidden="true">
          <g id="edge-overlay-group"></g>
        </svg>
        <div id="edge-hint" class="edge-hint" aria-live="polite"></div>
        <div id="empty-hint" class="empty-hint">
          Double-click to create nodes. Drag from one anchor point to another to connect nodes.
        </div>
      </div>
      <div id="import-status" class="toast" aria-live="polite" hidden></div>
    </main>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
